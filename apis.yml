aid: international-trade-commission
name: International Trade Commission
description: >-
  The United States International Trade Commission is an independent,
  nonpartisan, quasi-judicial federal agency that fulfills a range of
  trade-related mandates. The USITC provides high-quality analysis of
  international trade issues and serves as a forum for intellectual property
  and trade dispute adjudication. USITC provides data access through its
  data services.
