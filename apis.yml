aid: international-trade-commission
name: International Trade Commission
description: >-
  The United States International Trade Commission (USITC) is an independent,
  nonpartisan, quasi-judicial federal agency that fulfills a range of
  trade-related mandates. The USITC provides high-quality analysis of
  international trade issues to the President and the Congress, and serves as
  the primary forum for the adjudication of intellectual property and trade
  disputes. The agency exposes U.S. trade and tariff statistics through the
  USITC DataWeb interactive data service.
